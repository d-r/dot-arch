#-------------------------------------------------------------------------------
# VARIABLES

$run_menu = fuzzel

$term_class = kitty
$term = kitty

$scratch_term_class = sc-term
$scratch_term = $term --class $scratch_term_class

#-------------------------------------------------------------------------------
# MONITORS

# https://wiki.hyprland.org/Configuring/Monitors/

# name, resolution, position, scale
monitor=,preferred,auto,1.0

#-------------------------------------------------------------------------------
# ENVIRONMENT VARIABLES

# https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#-------------------------------------------------------------------------------
# THEMING / DARK MODE

# GTK4
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

# GTK3
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"
# TODO: Is this the correct name? How would I find that out?
exec = gsettings set org.gnome.desktop.interface icon-theme "adw-gtk3"

# GTK3
# env = GTK_THEME,Adwaita:dark

#-------------------------------------------------------------------------------
# STARTUP - INFRASTRUCTURE

# https://wiki.hyprland.org/Configuring/Keywords/

# Start notification daemon
exec-once = swaync

# Set wallpaper
exec-once = swaybg --image ~/images/wallpapers/alena-aenami-all-i-need-1080p.jpg

# Enable top bar
exec-once = waybar

# Start udiskie daemon to enable automounting of external drive
exec-once = udiskie

#-------------------------------------------------------------------------------
# WORKSPACES

# https://wiki.hyprland.org/Configuring/Workspace-Rules/
# https://wiki.hyprland.org/Configuring/Window-Rules/

# The [workspace X] form doesn't work for some apps. Presumably X11 ones?
# You'd think Code would fully support Wayland out of the box by now, but that
# does not seem to be the case?
# TODO: Stop using Code.

$r1_1 = 1
$r1_2 = 2
$r1_3 = 3
$r1_4 = 4

$r2_1 = 5
$r2_2 = 6
$r2_3 = 7
$r2_4 = 8

$r3_1 = 9
$r3_2 = 10
$r3_3 = 11
$r3_4 = 12

$r4_1 = 13
$r4_2 = 14
$r4_3 = 15
$r4_4 = 16

# Room 1 (Shed)

workspace = $r1_1, defaultName:1A, persistent:true
workspace = $r1_2, defaultName:2A, persistent:true
workspace = $r1_3, defaultName:3A, persistent:true
workspace = $r1_4, defaultName:4A, persistent:true
workspace = special:t1, border:false, on-created-empty:$scratch_term -d ~/dot

exec-once = [workspace $r1_1 silent] qutebrowser
exec-once = code
windowrule = workspace $r1_2 silent, class:Code

# Room 2 (Lab)

workspace = $r2_1, defaultName:1B, persistent:true
workspace = $r2_2, defaultName:2B, persistent:true
workspace = $r2_3, defaultName:3B, persistent:true
workspace = $r2_4, defaultName:4B, persistent:true
workspace = special:t2, border:false, on-created-empty:$scratch_term -d ~/src

# Room 3 (Studio)

workspace = $r3_1, defaultName:1C, persistent:true
workspace = $r3_2, defaultName:2C, persistent:true
workspace = $r3_3, defaultName:3C, persistent:true
workspace = $r3_4, defaultName:4C, persistent:true
workspace = special:t3, border:false, on-created-empty:$scratch_term -d "~/.local/share/Renoise/User Library"

exec-once = renoise
windowrule = workspace $r3_1 silent, class:Renoise

# Room 4 (Study)

workspace = $r4_1, defaultName:1D, persistent:true
workspace = $r4_2, defaultName:2D, persistent:true
workspace = $r4_3, defaultName:3D, persistent:true
workspace = $r4_4, defaultName:4D, persistent:true
workspace = special:t4, border:false, on-created-empty:$scratch_term -d ~/dl

exec-once = [workspace $r4_1 silent] firefox
exec-once = [workspace $r4_2 silent] obsidian

# Global terminal scratchpad

workspace = special:term, border:false, on-created-empty:$scratch_term

#-------------------------------------------------------------------------------
# WINDOWS

# Make scratch terminal transparent
windowrule = opacity 0.7, class:$scratch_term_class

# Open scratch terminal as group
windowrule = group set always, class:$scratch_term_class

# Open browser as a group
windowrule = group set always, class:firefox
windowrule = group set always, class:Brave-browser
windowrule = group set always, class:.*.qutebrowser

# Float and pin pavucontrol
windowrule = float, class:.*pavucontrol
windowrule = pin, class:.*pavucontrol
windowrule = size 900 700, class:.*pavucontrol
windowrule = center, class:.*pavucontrol

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland.
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
