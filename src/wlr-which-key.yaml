font: JetBrainsMono Nerd Font 16
background: "#1a1b26"
color: "#c0caf5"
border: "#7fc8ff"
separator: "    "
border_width: 1
corner_r: 0
padding: 20
anchor: center
menu:
  - key: "b"
    desc: Browser
    cmd: cx browser
  - key: "l"
    desc: Links
    cmd: cx links
  - key: "r"
    desc: Repos
    cmd: cx repos
  - key: "e"
    desc: Explorer
    cmd: cx explorer
  - key: "d"
    desc: Directory
    cmd: cx dir
  # - key: "k"
  #   desc: keybr.com
  #   cmd: webapp keybr https://www.keybr.com/
  - key: "t"
    desc: TODO
    cmd: cx todo
  - key: "w"
    desc: WhatsApp
    cmd: webapp whatsapp https://web.whatsapp.com/
  - key: "p"
    desc: Power
    submenu:
      - key: "s"
        desc: Suspend
        cmd: systemctl suspend
      - key: "r"
        desc: Soft reboot
        cmd: systemctl soft-reboot
      - key: "R"
        desc: Reboot
        cmd: reboot
      - key: "o"
        desc: Power-off
        cmd: systemctl poweroff
